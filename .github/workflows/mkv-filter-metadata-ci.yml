name: MKV Filter Metadata CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'mkv-filter-metadata/**'
      - '.github/workflows/mkv-filter-metadata-ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'mkv-filter-metadata/**'
      - '.github/workflows/mkv-filter-metadata-ci.yml'

jobs:
  test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mkv-filter-metadata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tauri OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: mkv-filter-metadata/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install

      - name: Cache sidecar binaries
        uses: actions/cache@v4
        id: sidecar-cache
        with:
          path: mkv-filter-metadata/backend/sidecars
          key: sidecars-${{ hashFiles('mkv-filter-metadata/scripts/download-sidecars.mjs') }}

      - name: Download sidecars
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        run: pnpm prebuild

      - name: Frontend check
        run: pnpm -F frontend check

      - name: Check for dead code
        run: pnpm run check:deadcode

      - name: Rust format check
        run: cargo fmt --manifest-path backend/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path backend/Cargo.toml -- -D warnings

      - name: Run tests
        run: pnpm test

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin
        
      - name: Enforce test coverage
        run: pnpm run test:coverage
