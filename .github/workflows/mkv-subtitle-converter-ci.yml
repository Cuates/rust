name: MKV Subtitle Converter CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'mkv-subtitle-converter/**'
      - '.github/workflows/mkv-subtitle-converter-ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'mkv-subtitle-converter/**'
      - '.github/workflows/mkv-subtitle-converter-ci.yml'

jobs:
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mkv-subtitle-converter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/mkv-subtitle-converter-setup

      - name: Frontend check
        run: pnpm -F frontend check

      - name: Check for dead code
        run: pnpm run check:deadcode

      - name: Rust format check
        run: cargo fmt --manifest-path backend/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path backend/Cargo.toml -- -D warnings

  test:
    name: Test Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mkv-subtitle-converter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/mkv-subtitle-converter-setup

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce test coverage
        run: pnpm run test:coverage

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mkv-subtitle-converter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/mkv-subtitle-converter-setup

      - name: Build Application
        run: CARGO_PROFILE_RELEASE_LTO=false pnpm exec tauri build --no-bundle

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mkv-subtitle-converter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/mkv-subtitle-converter-setup

      - name: Run tests
        run: pnpm test

  test-macos:
    name: Test on macOS
    strategy:
      matrix:
        # Note: macos-13 (Intel) was removed due to extreme queue times (> 1 hour) on GitHub's free tier. 
        # We are intentionally opting out of a scheduled weekly Intel Mac job as well.
        # Apple Silicon (macos-latest) provides sufficient validation for macOS CI logic.
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      RUST_BACKTRACE: "1"
    defaults:
      run:
        working-directory: mkv-subtitle-converter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/mkv-subtitle-converter-setup

      - name: Run tests
        run: |
          pnpm -F frontend test:unit --run
          cargo test --manifest-path backend/Cargo.toml -- --nocapture
