<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MKV Filter Metadata</title>
    %sveltekit.head%
    <script>
      window.onerror = function (msg, url, lineNo, columnNo, error) {
        document.body.innerHTML +=
          '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:10px;font-size:16px;white-space:pre-wrap;">ERROR: ' +
          msg +
          '\n' +
          (error ? error.stack : '') +
          '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function (event) {
        document.body.innerHTML +=
          '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:10px;font-size:16px;white-space:pre-wrap;">PROMISE ERROR: ' +
          event.reason +
          '</div>';
      });
    </script>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('app-theme');
          var isDark = saved
            ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.className = isDark ? 'dark-mode' : 'light-mode';
          document.documentElement.style.backgroundColor = isDark ? '#0f111a' : '#f1f5f9';
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
